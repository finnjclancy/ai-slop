name: AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review-pr:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Extract PR data
      id: pr-data
      run: |
        # Get PR details
        PR_TITLE="${{ github.event.pull_request.title }}"
        PR_BODY="${{ github.event.pull_request.body }}"
        PR_NUMBER="${{ github.event.pull_request.number }}"
        
        # Get diff using GitHub API
        DIFF=$(curl -s -H "Authorization: token ${{ secrets.PERSONAL_ACCESS_TOKEN }}" \
          -H "Accept: application/vnd.github.diff" \
          "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER")
        
        # Create JSON payload (escape quotes and newlines properly)
        jq -n \
          --arg title "$PR_TITLE" \
          --arg body "$PR_BODY" \
          --arg diff "$DIFF" \
          --argjson number $PR_NUMBER \
          --arg repository "${{ github.repository }}" \
          '{
            title: $title,
            body: $body,
            diff: $diff,
            number: $number,
            repository: $repository
          }' > pr_data.json
        
        echo "PR data extracted"
        
    - name: Call AI Review API
      id: ai-review
      run: |
        # Debug: Show the JSON file content
        echo "=== PR Data JSON ==="
        cat pr_data.json
        echo "===================="
        
        # Call our local API
        RESPONSE=$(curl -s -w "%{http_code}" -X POST \
          -H "Content-Type: application/json" \
          -H "ngrok-skip-browser-warning: true" \
          -H "User-Agent: GitHub-Actions" \
          -d @pr_data.json \
          "${{ secrets.LOCAL_SERVER_URL }}/review")
        
        echo "=== API Response ==="
        echo "$RESPONSE"
        echo "===================="
        
        # Extract HTTP code and body
        HTTP_CODE="${RESPONSE: -3}"
        BODY="${RESPONSE%???}"
        
        echo "HTTP Code: $HTTP_CODE"
        echo "Response Body: $BODY"
        
        # Extract decision
        DECISION=$(echo "$BODY" | jq -r '.decision // "unknown"')
        REASON=$(echo "$BODY" | jq -r '.reason // "unknown"')
        
        echo "AI Decision: $DECISION"
        echo "AI Reason: $REASON"
        
        # Set output variables
        echo "decision=$DECISION" >> $GITHUB_OUTPUT
        echo "reason=$REASON" >> $GITHUB_OUTPUT
        
    - name: Approve PR
      if: steps.ai-review.outputs.decision == 'approve'
      run: |
        curl -X POST \
          -H "Authorization: token ${{ secrets.PERSONAL_ACCESS_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
          -d '{
            "event": "APPROVE",
            "body": "🤖 AI Review: ${{ steps.ai-review.outputs.reason }}"
          }'
          
    - name: Request Changes
      if: steps.ai-review.outputs.decision == 'reject'
      run: |
        curl -X POST \
          -H "Authorization: token ${{ secrets.PERSONAL_ACCESS_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
          -d '{
            "event": "REQUEST_CHANGES",
            "body": "🤖 AI Review: ${{ steps.ai-review.outputs.reason }}"
          }' 